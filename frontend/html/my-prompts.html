<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Prompts — PromptVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="navbar-container"></div>
<section class="section">
    <div class="container">
        <div id="flash"></div>
        <div class="is-flex is-justify-content-space-between is-align-items-center mb-4 is-flex-wrap-wrap" style="gap:0.75rem">
            <h1 class="pv-section-title mb-0">My Prompts</h1>
            <a href="/prompt-form.html" class="button is-primary">+ New Prompt</a>
        </div>
        <div class="table-container">
            <table class="table is-fullwidth is-hoverable">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Visibility</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="promptsBody"></tbody>
            </table>
        </div>
        <div id="paginationContainer"></div>
    </div>
</section>

<!-- AI Response modal -->
<div class="modal" id="aiModal">
    <div class="modal-background"></div>
    <div class="modal-card" style="max-width:560px;width:100%">
        <header class="modal-card-head">
            <p class="modal-card-title" style="font-size:1rem">AI Response</p>
            <button class="delete" id="closeModal" aria-label="close"></button>
        </header>
        <section class="modal-card-body">
            <div id="aiWarning"></div>
            <div class="pv-ai-response" id="aiResponseText"></div>
        </section>
        <footer class="modal-card-foot">
            <button class="button" id="closeModalBtn">Close</button>
        </footer>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/my-prompts.js"></script>
</body>
</html>
