<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — PromptVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="pv-auth-page">
    <div>
        <p class="pv-auth-logo">PromptVault</p>
        <p class="pv-auth-tagline">Secure prompt management for everyone</p>
        <div class="pv-auth-box">
            <h1 class="title is-5 mb-4" style="color:#1B1F3B">Sign in</h1>
            <div id="flash"></div>
            <form id="loginForm">
                <div class="field">
                    <label class="label">Username</label>
                    <div class="control">
                        <input class="input" type="text" id="username" placeholder="your username" autocomplete="username" required>
                    </div>
                </div>
                <div class="field">
                    <label class="label">Password</label>
                    <div class="control">
                        <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                </div>
                <div class="field mt-5">
                    <button type="submit" class="button is-primary is-fullwidth" id="submitBtn">Sign in</button>
                </div>
            </form>
            <p class="has-text-centered mt-4" style="font-size:0.85rem;color:#6B7280">
                No account? <a href="/register.html" style="color:#5B4FCF;font-weight:600">Register</a>
            </p>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
