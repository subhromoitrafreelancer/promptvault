<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keywords — PromptVault Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="navbar-container"></div>
<section class="section">
    <div class="container">
        <div id="flash"></div>
        <h1 class="pv-section-title">Policy Keywords</h1>
        <p class="mb-4" style="font-size:0.88rem;color:#6B7280">
            Prompts containing these keywords (case-insensitive) will be flagged automatically.
        </p>

        <div class="pv-inline-form">
            <h2 class="subtitle is-6 mb-3" id="formLabel">Add Keyword</h2>
            <div class="columns is-vcentered">
                <div class="column is-6">
                    <input class="input" type="text" id="kwValue" placeholder="e.g. confidential" maxlength="100">
                </div>
                <div class="column is-6">
                    <div class="buttons">
                        <button class="button is-primary" onclick="saveKeyword()">Save</button>
                        <button class="button is-light" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table class="table is-fullwidth is-hoverable">
                <thead>
                    <tr><th>Keyword</th><th>Added</th><th>Actions</th></tr>
                </thead>
                <tbody id="kwBody"></tbody>
            </table>
        </div>
        <div id="paginationContainer"></div>
    </div>
</section>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/admin/keywords.js"></script>
</body>
</html>
