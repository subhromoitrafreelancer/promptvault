<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flagged Prompts — PromptVault Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="navbar-container"></div>
<section class="section">
    <div class="container">
        <div id="flash"></div>
        <h1 class="pv-section-title">Flagged Prompts</h1>
        <p class="mb-4" style="font-size:0.88rem;color:#6B7280">
            Prompts that matched one or more policy keywords. Each row is one keyword match.
            Clearing a flag marks the prompt reviewed — it will re-flag automatically if the user edits and saves.
        </p>
        <div class="table-container">
            <table class="table is-fullwidth is-hoverable">
                <thead>
                    <tr>
                        <th>Prompt title</th>
                        <th>Owner</th>
                        <th>Matched keyword</th>
                        <th>Flagged at</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="flaggedBody"></tbody>
            </table>
        </div>
        <div id="paginationContainer"></div>
    </div>
</section>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/admin/flagged.js"></script>
</body>
</html>
