# H2 file-based datasource (Docker volume)
spring.datasource.url=jdbc:h2:file:/app/data/promptvault;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable H2 console in Docker
spring.h2.console.enabled=false

# JWT overrides via env vars
jwt.secret=${JWT_SECRET:promptvault-secret-key-must-be-at-least-32-chars-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
