services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-promptvault-secret-key-32-chars-minimum}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    volumes:
      - h2-data:/app/data

volumes:
  h2-data:
